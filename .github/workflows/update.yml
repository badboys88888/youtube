name: IPTV Update

on:
  schedule:
    - cron: "0 */2 * * *"   # 每2小时
  workflow_dispatch:        # 手动运行按钮

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉代码
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 安装 yt-dlp
        run: pip install yt-dlp

      - name: 创建输出目录
        run: mkdir -p output

      # 👇 关键：先生成 JSON
      - name: 生成 JSON
        run: python Global_Vision_list.py

      # 👇 再生成 M3U（依赖 JSON）
      - name: 生成 M3U
        run: python json_to_m3u.py

      # 👇 提交结果
      - name: 提交文件
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "auto update" || echo "no changes"
          git push
