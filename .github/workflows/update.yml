name: IPTV Update

on:
  schedule:
    - cron: "0 0 * * 1"  # 每周一
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yt-dlp

      - name: Run scripts
        run: |
          mkdir -p output
          python Global_Vision_list.py
          python json_to_m3u.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "auto update IPTV"
          git pull --rebase || true
          git push
